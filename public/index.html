<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Notes App</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --text-main: #1f2937;
      --bg-glass: rgba(255, 255, 255, 0.85);
      --blur: blur(12px);
    }
    * { box-sizing: border-box; }
    
    body { 
      font-family: 'Inter', sans-serif; 
      margin: 0;
      min-height: 100vh;
      display: flex; 
      justify-content: center; 
      align-items: center;
      padding: 40px 20px; 
      color: var(--text-main);
      overflow-x: hidden;
      background: #0f172a;
    }

    .bg-animation {
      position: fixed;
      top: -10%; left: -10%; width: 120%; height: 120%;
      background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') no-repeat center center/cover;
      z-index: -1;
      animation: kenburns 20s infinite alternate linear;
    }
    
    @keyframes kenburns {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.1) translate(-2%, -2%); }
    }

    .container { 
      width: 100%; 
      max-width: 500px; 
      z-index: 1;
      animation: fadeInUp 0.8s ease-out forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 { 
      text-align: center; 
      color: #fff; 
      font-size: 2.5rem;
      text-shadow: 0 4px 10px rgba(0,0,0,0.3);
      margin-bottom: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .section { 
      background: var(--bg-glass); 
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 16px; 
      padding: 30px; 
      margin-bottom: 24px; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.15); 
      transition: all 0.3s ease;
    }

    h3 { margin-top: 0; color: var(--text-main); font-size: 1.5rem; margin-bottom: 20px; font-weight: 600; }

    input, textarea { 
      width: 100%; 
      padding: 14px 16px; 
      margin-bottom: 16px; 
      border-radius: 10px; 
      border: 1px solid rgba(0,0,0,0.1); 
      background: rgba(255,255,255,0.9);
      font-size: 16px; 
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    textarea { resize: vertical; min-height: 100px; }

    button { 
      width: 100%;
      background: var(--primary); 
      color: white; 
      padding: 14px 20px; 
      border: none; 
      border-radius: 10px; 
      cursor: pointer; 
      font-size: 16px;
      font-weight: 600; 
      transition: transform 0.2s, background 0.2s, box-shadow 0.2s; 
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }
    
    button:hover { 
      background: var(--primary-hover); 
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
    }
    
    button:active { transform: translateY(0); }

    .note { 
      background: rgba(255, 255, 255, 0.95); 
      border-left: 5px solid var(--primary); 
      padding: 16px; 
      margin-bottom: 16px; 
      border-radius: 10px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      transition: transform 0.2s ease;
    }

    .note:hover { transform: scale(1.02); }
    .note div { max-width: 75%; }
    .note strong { display: block; font-size: 1.1rem; margin-bottom: 6px; color: #111; }
    .note p { margin: 0; color: #555; line-height: 1.5; word-wrap: break-word; }

    .note button { 
      width: auto;
      background: var(--danger); 
      padding: 8px 16px; 
      font-size: 14px; 
      box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3);
    }
    
    .note button:hover { 
      background: var(--danger-hover); 
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
    }

    #notesSection { display: none; }
    #registerForm { display: none; }
    
    .toggle-form {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      color: #555;
    }
    
    .toggle-form span {
      color: var(--primary);
      font-weight: 600;
      cursor: pointer;
    }
    
    .toggle-form span:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="bg-animation"></div>
<div class="container">
  <h1>Cloud Notes App</h1>

  <!-- LOGIN -->
  <div id="loginForm" class="section">
    <h3>Welcome Back</h3>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="toggle-form">
      Don't have an account? <span onclick="toggleAuthMode('register')">Register</span>
    </div>
  </div>

  <!-- REGISTER -->
  <div id="registerForm" class="section">
    <h3>Create Account</h3>
    <input type="text" id="regName" placeholder="Name">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPassword" placeholder="Password">
    <button onclick="register()">Register</button>
    <div class="toggle-form">
      Already have an account? <span onclick="toggleAuthMode('login')">Login</span>
    </div>
  </div>

  <!-- NOTES -->
  <div id="notesSection" class="section">
    <h3>Add a Note</h3>
    <input type="text" id="title" placeholder="Title">
    <textarea id="content" placeholder="Content"></textarea>
    <button onclick="addNote()">Add Note</button>

    <h3 style="margin-top: 30px;">Your Notes</h3>
    <div id="notes"></div>
    <button onclick="logout()" style="margin-top: 20px; background: #9ca3af; box-shadow: none;">Logout</button>
  </div>
</div>

<script>
let token = null;
const apiAuth = "/api/auth";
const apiNotes = "/api/notes";

// LOGIN
async function login() {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;
  const res = await fetch(apiAuth + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  if (data.token) {
    token = data.token;
    showNotesSection();
  } else alert(data.message || data);
}

// REGISTER
async function register() {
  const name = document.getElementById("regName").value;
  const email = document.getElementById("regEmail").value;
  const password = document.getElementById("regPassword").value;
  const res = await fetch(apiAuth + "/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, email, password })
  });
  const data = await res.json();
  if (data.token) {
    token = data.token;
    showNotesSection();
  } else alert(data.message || data);
}

// SHOW NOTES SECTION
function showNotesSection() {
  document.getElementById("loginForm").style.display = "none";
  document.getElementById("registerForm").style.display = "none";
  document.getElementById("notesSection").style.display = "block";
  fetchNotes(); // fetch notes immediately
}

// UI TOGGLE
function toggleAuthMode(mode) {
  if (mode === 'register') {
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("registerForm").style.display = "block";
  } else {
    document.getElementById("loginForm").style.display = "block";
    document.getElementById("registerForm").style.display = "none";
  }
}

// LOGOUT
function logout() {
  token = null;
  document.getElementById("loginForm").style.display = "block";
  document.getElementById("registerForm").style.display = "none";
  document.getElementById("notesSection").style.display = "none";
}

// FETCH NOTES
async function fetchNotes() {
  if (!token) return;
  try {
    const res = await fetch(apiNotes, { headers: { "Authorization": "Bearer " + token } });
    const data = await res.json();
    const notesDiv = document.getElementById("notes");
    notesDiv.innerHTML = "";
    data.forEach(note => {
      const div = document.createElement("div");
      div.className = "note";
      div.innerHTML = `
        <div>
          <strong>${note.title}</strong>
          <p>${note.content}</p>
        </div>
        <button onclick="deleteNote('${note._id}')">Delete</button>
      `;
      notesDiv.appendChild(div);
    });
  } catch (err) { console.error(err); }
}

// ADD NOTE
async function addNote() {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  if (!title || !content) return alert("Enter title and content");

  try {
    const res = await fetch(apiNotes, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ title, content })
    });
    const data = await res.json();
    document.getElementById("title").value = "";
    document.getElementById("content").value = "";
    fetchNotes(); // refresh after adding
  } catch (err) { console.error(err); }
}

// DELETE NOTE
async function deleteNote(id) {
  try {
    const res = await fetch(apiNotes + "/" + id, {
      method: "DELETE",
      headers: { "Authorization": "Bearer " + token }
    });
    const data = await res.json();
    if (res.ok) fetchNotes();
    else alert(data.message || "Error deleting note");
  } catch (err) { console.error(err); }
}
</script>
</body>
</html>
